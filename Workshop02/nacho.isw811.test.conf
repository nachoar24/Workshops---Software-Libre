<VirtualHost *:80>

    ServerName nacho.isw811.test

    ServerAdmin webmaster@localhost

    DocumentRoot /vagrant/sites/nacho.isw811.test

    DirectoryIndex index.php index.html

    <Directory /vagrant/sites/nacho.isw811.test>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/nacho_error.log
    CustomLog ${APACHE_LOG_DIR}/nacho_access.log combined

</VirtualHost>
