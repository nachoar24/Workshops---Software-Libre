<VirtualHost *:80>
	ServerName lospatitos.com
	ServerAlias www.lospatitos.com

	ServerAdmin webmaster@localhost
	DocumentRoot /vagrant/sites/lospatitos.com
	DirectoryIndex index.php index.html

	<Directory /vagrant/sites/lospatitos.com>
		Options FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/lospatitos_error.log
	CustomLog ${APACHE_LOG_DIR}/lospatitos_access.log combined
</VirtualHost>
